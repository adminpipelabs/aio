name: Auto Deploy to Hetzner
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Hetzner
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: 87.99.155.192
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /root/aio
          git pull origin main
          npm install
          npm run build
          pm2 restart aio || pm2 start server.js --name aio
          echo "✅ aio deployed successfully at $(date)"
